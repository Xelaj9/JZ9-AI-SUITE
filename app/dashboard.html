<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — JZ9suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/jz9.css">
</head>
<body>
  <nav class="jz-nav">
    <div class="jz-container jz-nav-inner">
      <a class="jz-logo" href="/app/dashboard.html"><span class="jz-logo-badge">JZ9</span> JZ9suite</a>
      <div class="jz-row">
        <a class="jz-btn jz-btn-ghost" href="/index.html">🎨 Studio</a>
        <a class="jz-btn jz-btn-ghost" id="adminLink" href="/admin/index.html" style="display:none">🛠 Admin</a>
        <button class="jz-btn jz-btn-ghost" id="logoutBtn">ออกจากระบบ</button>
      </div>
    </div>
  </nav>

  <main class="jz-container jz-section">
    <div id="loading" class="jz-loading"><span class="jz-spin"></span><div style="margin-top:10px">กำลังโหลด…</div></div>

    <div id="content" style="display:none">
      <div class="jz-spread" style="margin-bottom:24px">
        <div>
          <h1 style="margin:0">สวัสดี, <span id="userName">—</span> 👋</h1>
          <p class="jz-muted" style="margin:4px 0 0">ยินดีต้อนรับสู่คลัง Prompt ส่วนตัวของคุณ</p>
        </div>
        <a class="jz-btn jz-btn-primary" href="/app/editor.html">+ สร้าง Prompt ใหม่</a>
      </div>

      <div class="jz-grid jz-grid-3" style="margin-bottom:24px">
        <div class="jz-card jz-stat"><span class="num" id="statPrompts">0</span><span class="lbl">Prompt ทั้งหมด</span></div>
        <div class="jz-card jz-stat"><span class="num" id="statFav">0</span><span class="lbl">Favorite</span></div>
        <div class="jz-card jz-stat"><span class="num" id="statImages">0</span><span class="lbl">รูปภาพ</span></div>
      </div>

      <div class="jz-card">
        <div class="jz-spread" style="margin-bottom:14px">
          <h3 style="margin:0">Prompt ล่าสุด</h3>
          <a class="jz-muted" href="/app/editor.html" style="font-size:13px">ดูทั้งหมด →</a>
        </div>
        <div id="recent"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/analytics.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    (async function () {
      var profile = await window.JZ9.auth.requireAuth();
      if (!profile) return; // guard redirected
      await window.JZ9.auth.recordLogin();

      document.getElementById("userName").textContent = profile.name || profile.email;
      if (profile.role === "admin") document.getElementById("adminLink").style.display = "";

      var sb = window.JZ9.sb;
      // counts (RLS scopes these to the current user automatically)
      var p = await sb.from("prompts").select("id,is_favorite", { count: "exact" });
      var img = await sb.from("image_assets").select("id", { count: "exact", head: true });
      var prompts = p.data || [];
      document.getElementById("statPrompts").textContent = prompts.length;
      document.getElementById("statFav").textContent = prompts.filter(function (x) { return x.is_favorite; }).length;
      document.getElementById("statImages").textContent = img.count || 0;

      // recent
      var r = await sb.from("prompts").select("id,title,use_case,updated_at").order("updated_at", { ascending: false }).limit(5);
      var box = document.getElementById("recent");
      if (!r.data || r.data.length === 0) {
        box.innerHTML = '<div class="jz-empty">ยังไม่มี Prompt — กด “สร้าง Prompt ใหม่” เพื่อเริ่ม</div>';
      } else {
        box.innerHTML = r.data.map(function (x) {
          return '<div class="jz-spread" style="padding:12px 0;border-bottom:1px solid var(--jz-border)">' +
            '<div><div style="font-weight:600">' + escapeHtml(x.title) + '</div>' +
            '<div class="jz-muted" style="font-size:12px">' + (x.use_case || "—") + '</div></div>' +
            '<a class="jz-muted" href="/app/editor.html?id=' + x.id + '">เปิด →</a></div>';
        }).join("");
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "";
    })();

    document.getElementById("logoutBtn").addEventListener("click", function () { window.JZ9.auth.signOut(); });
    function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  </script>
</body>
</html>
