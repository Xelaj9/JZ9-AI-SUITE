<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery — JZ9suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/jz9.css">
  <style>
    .drop { border:2px dashed var(--jz-border); border-radius: var(--jz-radius); padding: 30px; text-align:center; cursor:pointer; transition: all .15s; color: var(--jz-text-dim); }
    .drop.hover, .drop:hover { border-color: var(--jz-green); background: rgba(34,197,94,0.05); }
    .gal { display:grid; gap:12px; grid-template-columns: repeat(2,1fr); margin-top:18px; }
    @media (min-width:640px){ .gal { grid-template-columns: repeat(3,1fr); } }
    @media (min-width:980px){ .gal { grid-template-columns: repeat(4,1fr); } }
    .gitem { background: var(--jz-surface); border:1px solid var(--jz-border); border-radius: var(--jz-radius-sm); overflow:hidden; position:relative; }
    .gitem img { width:100%; height:130px; object-fit:cover; display:block; cursor:pointer; }
    .gitem .meta { padding:8px 10px; font-size:11px; color: var(--jz-text-dim); display:flex; justify-content:space-between; align-items:center; gap:6px; }
    .gitem .del { background:transparent; border:none; color:var(--jz-danger); cursor:pointer; font-size:14px; }
    .gname { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    /* lightbox */
    .lb { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
    .lb.on { display:flex; }
    .lb img { max-width:92vw; max-height:88vh; border-radius:10px; }
  </style>
</head>
<body>
  <nav class="jz-nav">
    <div class="jz-container jz-nav-inner">
      <a class="jz-logo" href="/app/dashboard.html"><span class="jz-logo-badge">JZ9</span> JZ9suite</a>
      <div class="jz-row">
        <a class="jz-btn jz-btn-ghost" href="/app/dashboard.html">🏠 Dashboard</a>
        <a class="jz-btn jz-btn-ghost" href="/app/library.html">📚 Library</a>
        <button class="jz-btn jz-btn-ghost" id="logoutBtn">ออกจากระบบ</button>
      </div>
    </div>
  </nav>

  <main class="jz-container jz-section">
    <div class="jz-spread" style="margin-bottom:18px">
      <h1 style="margin:0">🖼 Image Gallery</h1>
      <span class="jz-muted" id="count"></span>
    </div>

    <div class="drop" id="drop">
      <div style="font-size:34px">⬆️</div>
      <div style="margin-top:6px;font-weight:600;color:var(--jz-text)">ลากรูปมาวาง หรือคลิกเพื่อเลือก</div>
      <div style="font-size:12px;margin-top:4px">JPG / PNG / WEBP • สูงสุด 10MB</div>
      <input type="file" id="file" accept="image/jpeg,image/png,image/webp" multiple style="display:none">
    </div>
    <div class="auth-msg" id="msg" style="display:none;padding:10px 13px;border-radius:10px;margin-top:12px"></div>

    <div id="loading" class="jz-loading" style="margin-top:18px"><span class="jz-spin"></span></div>
    <div id="empty" class="jz-empty" style="display:none;margin-top:18px">ยังไม่มีรูป — อัปโหลดรูปแรกของคุณได้เลย</div>
    <div id="gal" class="gal" style="display:none"></div>
  </main>

  <div class="lb" id="lb"><img id="lbimg" src="" alt=""></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/analytics.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/images.js"></script>
  <script>
    var IM = window.JZ9.images;
    function byId(x){ return document.getElementById(x); }
    function esc(s){ return (s||"").replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }
    function msg(t,kind){ var m=byId("msg"); m.style.display=t?"block":"none"; m.textContent=t||"";
      m.style.background = kind==="err"?"rgba(248,113,113,0.12)":"rgba(34,197,94,0.12)";
      m.style.color = kind==="err"?"var(--jz-danger)":"var(--jz-green-bright)";
      m.style.border = "1px solid "+(kind==="err"?"rgba(248,113,113,0.35)":"rgba(34,197,94,0.3)"); }

    async function load(){
      byId("loading").style.display=""; byId("gal").style.display="none"; byId("empty").style.display="none";
      try {
        var rows = await IM.withUrls(await IM.list());
        byId("loading").style.display="none";
        byId("count").textContent = rows.length + " รูป";
        if (!rows.length){ byId("empty").style.display=""; return; }
        var g = byId("gal"); g.style.display="";
        g.innerHTML = rows.map(function(r){
          return '<div class="gitem" data-id="'+r.id+'">' +
            '<img src="'+(r.url||"")+'" data-full="'+(r.url||"")+'" alt="'+esc(r.filename)+'">' +
            '<div class="meta"><span class="gname" title="'+esc(r.filename)+'">'+esc(r.filename||"image")+'</span>' +
            '<button class="del" data-act="del" title="ลบ">🗑</button></div></div>';
        }).join("");
      } catch(e){ byId("loading").style.display="none"; msg("โหลดรูปไม่สำเร็จ: "+(e.message||e),"err"); }
    }

    async function uploadFiles(files){
      var arr = [].slice.call(files);
      if (!arr.length) return;
      msg("กำลังอัปโหลด "+arr.length+" รูป…","ok");
      var ok=0, fail=0;
      for (var i=0;i<arr.length;i++){
        try { await IM.upload(arr[i]); ok++; }
        catch(e){ fail++; console.warn("upload fail", e.message); }
      }
      msg("อัปโหลดสำเร็จ "+ok+" รูป"+(fail?(" · ไม่สำเร็จ "+fail):""), fail?"err":"ok");
      load();
    }

    // drag & drop
    var drop = byId("drop"), fileInput = byId("file");
    drop.addEventListener("click", function(){ fileInput.click(); });
    fileInput.addEventListener("change", function(){ uploadFiles(this.files); this.value=""; });
    ["dragenter","dragover"].forEach(function(ev){ drop.addEventListener(ev,function(e){ e.preventDefault(); drop.classList.add("hover"); }); });
    ["dragleave","drop"].forEach(function(ev){ drop.addEventListener(ev,function(e){ e.preventDefault(); drop.classList.remove("hover"); }); });
    drop.addEventListener("drop", function(e){ if (e.dataTransfer && e.dataTransfer.files) uploadFiles(e.dataTransfer.files); });

    // grid actions (delete + lightbox)
    byId("gal").addEventListener("click", async function(e){
      var del = e.target.closest('[data-act="del"]');
      if (del){ var card=e.target.closest(".gitem"); var id=card.getAttribute("data-id");
        if (confirm("ลบรูปนี้?")){ try{ await IM.remove(id); card.remove(); } catch(err){ msg("ลบไม่สำเร็จ: "+(err.message||err),"err"); } }
        return; }
      var img = e.target.closest("img");
      if (img){ byId("lbimg").src = img.getAttribute("data-full"); byId("lb").classList.add("on"); }
    });
    byId("lb").addEventListener("click", function(){ this.classList.remove("on"); });

    byId("logoutBtn").addEventListener("click", function(){ window.JZ9.auth.signOut(); });

    (async function(){
      var profile = await window.JZ9.auth.requireAuth();
      if (!profile) return;
      load();
    })();
  </script>
</body>
</html>
