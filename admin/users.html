<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — Admin — JZ9suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/jz9.css">
  <script defer src="/assets/js/rain-bg.js"></script>
  <style>
    .adm-nav a { padding:6px 12px; border-radius:8px; font-size:14px; color:var(--jz-text-dim); }
    .adm-nav a.on, .adm-nav a:hover { background:var(--jz-surface-2); color:var(--jz-text); }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--jz-border); font-size:13px; vertical-align:middle; }
    th { color:var(--jz-text-dim); font-weight:600; font-size:12px; text-transform:uppercase; }
    .mini { padding:5px 9px; font-size:12px; }
  </style>
</head>
<body>
  <nav class="jz-nav">
    <div class="jz-container jz-nav-inner">
      <a class="jz-logo" href="/admin/studio"><span class="jz-logo-badge">JZ9</span> Admin</a>
      <div class="jz-row adm-nav">
        <a href="/admin/studio">Dashboard</a>
        <a href="/admin/users" class="on">Users</a>
        <a href="/admin/prompts">Prompts</a>
        <a href="/admin/settings">Settings</a>
        <a class="jz-btn jz-btn-ghost" href="/app/dashboard" style="margin-left:8px">← App</a>
      </div>
    </div>
  </nav>

  <main class="jz-container jz-section">
    <div class="jz-spread" style="margin-bottom:16px">
      <h1 style="margin:0">👥 ผู้ใช้</h1>
      <input class="jz-input" id="search" placeholder="🔍 ค้นหา email / ชื่อ" style="max-width:320px">
    </div>
    <div id="loading" class="jz-loading"><span class="jz-spin"></span></div>
    <div id="error" class="jz-error" style="display:none"></div>
    <div class="jz-card" id="tableWrap" style="display:none;overflow-x:auto">
      <table><thead><tr><th>ชื่อ</th><th>อีเมล</th><th>Role</th><th>สมัครเมื่อ</th><th>สถานะ</th><th></th></tr></thead>
        <tbody id="body"></tbody></table>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin.js"></script>
  <script>
    var A = window.JZ9.admin, me=null, timer=null;
    function byId(x){ return document.getElementById(x); }
    function esc(s){ return (s||"").replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }
    function fmtDate(d){ if(!d) return "—"; try{ return new Date(d).toLocaleDateString("th-TH",{dateStyle:"medium"}); }catch(e){ return d; } }

    function row(u){
      var isMe = me && u.id===me.id;
      return '<tr data-id="'+u.id+'">'+
        '<td><a href="/admin/user?id='+u.id+'" style="color:var(--jz-green-bright)">'+esc(u.name||"—")+'</a></td>'+
        '<td class="jz-muted">'+esc(u.email||"")+'</td>'+
        '<td>'+(u.role==="admin"?'<span class="jz-chip" style="padding:1px 8px">admin</span>':'<span class="jz-tag">user</span>')+'</td>'+
        '<td class="jz-muted">'+fmtDate(u.created_at)+'</td>'+
        '<td>'+(u.is_disabled?'<span style="color:var(--jz-danger)">ปิดใช้งาน</span>':'<span style="color:var(--jz-green-bright)">ปกติ</span>')+'</td>'+
        '<td style="white-space:nowrap;text-align:right">'+
          '<button class="jz-btn mini" data-act="role" '+(isMe?'disabled title="เปลี่ยน role ตัวเองไม่ได้"':'')+'>'+(u.role==="admin"?"ปลด admin":"ตั้ง admin")+'</button> '+
          '<button class="jz-btn mini '+(u.is_disabled?'':'jz-btn-danger')+'" data-act="disable" '+(isMe?'disabled':'')+'>'+(u.is_disabled?"เปิดใช้":"ปิดใช้")+'</button>'+
        '</td></tr>';
    }

    async function load(){
      byId("loading").style.display=""; byId("tableWrap").style.display="none"; byId("error").style.display="none";
      try {
        var users = await A.listUsers(byId("search").value.trim());
        byId("body").innerHTML = users.length ? users.map(row).join("") : '<tr><td colspan="6" class="jz-muted">ไม่พบผู้ใช้</td></tr>';
        byId("loading").style.display="none"; byId("tableWrap").style.display="";
      } catch(e){ byId("loading").style.display="none"; byId("error").style.display=""; byId("error").textContent="โหลดไม่สำเร็จ: "+(e.message||e); }
    }

    byId("body").addEventListener("click", async function(e){
      var b = e.target.closest("[data-act]"); if (!b || b.disabled) return;
      var tr = e.target.closest("tr"); var id = tr.getAttribute("data-id"); var act = b.getAttribute("data-act");
      b.disabled = true;
      try {
        if (act==="role"){ var mk = b.textContent.indexOf("ตั้ง")>-1; if(!confirm(mk?"ตั้งผู้ใช้นี้เป็น admin?":"ปลด admin ผู้ใช้นี้?")) {b.disabled=false; return;} await A.setRole(id, mk?"admin":"user"); }
        else if (act==="disable"){ var dis = b.textContent.indexOf("ปิด")>-1; await A.setDisabled(id, dis); }
        load();
      } catch(err){ alert("ทำรายการไม่สำเร็จ: "+(err.message||err)); b.disabled=false; }
    });

    byId("search").addEventListener("input", function(){ clearTimeout(timer); timer=setTimeout(load,300); });

    (async function(){
      me = await window.JZ9.auth.requireAdmin();
      if (!me) return;
      load();
    })();
  </script>
</body>
</html>
