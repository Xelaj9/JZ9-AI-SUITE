<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Admin — JZ9suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/jz9.css">
  <style>
    .adm-nav a { padding:6px 12px; border-radius:8px; font-size:14px; color:var(--jz-text-dim); }
    .adm-nav a.on, .adm-nav a:hover { background:var(--jz-surface-2); color:var(--jz-text); }
    .field { margin-bottom:18px; }
    .switch { display:inline-flex; align-items:center; gap:10px; cursor:pointer; }
    .sw { width:44px; height:24px; border-radius:99px; background:var(--jz-surface-2); border:1px solid var(--jz-border); position:relative; transition:.2s; }
    .sw::after { content:""; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.2s; }
    .switch.on .sw { background:var(--jz-green); }
    .switch.on .sw::after { transform:translateX(20px); }
  </style>
</head>
<body>
  <nav class="jz-nav">
    <div class="jz-container jz-nav-inner">
      <a class="jz-logo" href="/admin/index.html"><span class="jz-logo-badge">JZ9</span> Admin</a>
      <div class="jz-row adm-nav">
        <a href="/admin/index.html">Dashboard</a>
        <a href="/admin/users.html">Users</a>
        <a href="/admin/prompts.html">Prompts</a>
        <a href="/admin/settings.html" class="on">Settings</a>
        <a class="jz-btn jz-btn-ghost" href="/app/dashboard.html" style="margin-left:8px">← App</a>
      </div>
    </div>
  </nav>

  <main class="jz-container jz-section" style="max-width:640px">
    <h1 style="margin:0 0 18px">⚙️ ตั้งค่าระบบ</h1>
    <div id="loading" class="jz-loading"><span class="jz-spin"></span></div>
    <div id="error" class="jz-error" style="display:none"></div>

    <div id="content" style="display:none">
      <div class="jz-card">
        <div class="field">
          <label class="jz-label" for="appName">ชื่อแอป (appName)</label>
          <input class="jz-input" id="appName">
        </div>
        <div class="field">
          <label class="jz-label">โหมดปิดปรับปรุง (maintenanceMode)</label>
          <div class="switch" id="maint"><div class="sw"></div><span id="maintTxt">ปิด</span></div>
        </div>
        <div class="field">
          <label class="jz-label" for="maxUpload">ขนาดอัปโหลดสูงสุด (MB)</label>
          <input class="jz-input" id="maxUpload" type="number" min="1" max="50">
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="jz-label" for="promptLimit">จำนวน Prompt สูงสุดต่อผู้ใช้ (defaultPromptLimit)</label>
          <input class="jz-input" id="promptLimit" type="number" min="1">
        </div>
      </div>
      <div class="jz-row" style="margin-top:16px">
        <button class="jz-btn jz-btn-primary" id="saveBtn">💾 บันทึกการตั้งค่า</button>
      </div>
      <div class="auth-msg" id="msg" style="display:none;padding:10px 13px;border-radius:10px;margin-top:14px"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin.js"></script>
  <script>
    var A = window.JZ9.admin, maint=false;
    function byId(x){ return document.getElementById(x); }
    function msg(t,kind){ var m=byId("msg"); m.style.display=t?"block":"none"; m.textContent=t||"";
      m.style.background = kind==="err"?"rgba(248,113,113,0.12)":"rgba(34,197,94,0.12)";
      m.style.color = kind==="err"?"var(--jz-danger)":"var(--jz-green-bright)";
      m.style.border = "1px solid "+(kind==="err"?"rgba(248,113,113,0.35)":"rgba(34,197,94,0.3)"); }
    function setMaint(v){ maint=!!v; byId("maint").classList.toggle("on",maint); byId("maintTxt").textContent = maint?"เปิด (ผู้ใช้เข้าไม่ได้)":"ปิด"; }

    byId("maint").addEventListener("click", function(){ setMaint(!maint); });

    byId("saveBtn").addEventListener("click", async function(){
      var btn=this; btn.disabled=true; var lbl=btn.textContent; btn.textContent="กำลังบันทึก…";
      try {
        await A.setSetting("appName", byId("appName").value.trim() || "JZ9suite");
        await A.setSetting("maintenanceMode", maint);
        await A.setSetting("maxUploadSizeMB", parseInt(byId("maxUpload").value,10) || 10);
        await A.setSetting("defaultPromptLimit", parseInt(byId("promptLimit").value,10) || 500);
        msg("บันทึกการตั้งค่าแล้ว ✓","ok");
      } catch(e){ msg("บันทึกไม่สำเร็จ: "+(e.message||e),"err"); }
      finally { btn.disabled=false; btn.textContent=lbl; }
    });

    (async function(){
      var me = await window.JZ9.auth.requireAdmin(); if (!me) return;
      try {
        var s = await A.getSettings();
        byId("appName").value = s.appName || "JZ9suite";
        setMaint(s.maintenanceMode === true);
        byId("maxUpload").value = s.maxUploadSizeMB || 10;
        byId("promptLimit").value = s.defaultPromptLimit || 500;
        byId("loading").style.display="none"; byId("content").style.display="";
      } catch(e){ byId("loading").style.display="none"; byId("error").style.display=""; byId("error").textContent="โหลดไม่สำเร็จ: "+(e.message||e); }
    })();
  </script>
</body>
</html>
