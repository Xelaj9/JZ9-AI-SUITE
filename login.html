<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — JZ9suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/jz9.css">
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 400px; text-align: center; }
    .auth-card .jz-logo { justify-content: center; font-size: 24px; margin-bottom: 8px; }
    .auth-sub { color: var(--jz-text-dim); font-size: 14px; margin: 6px 0 26px; }
    .auth-foot { margin-top: 22px; font-size: 12px; color: var(--jz-text-mute); }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="jz-card auth-card">
      <div class="jz-logo"><span class="jz-logo-badge">JZ9</span> JZ9suite</div>
      <p class="auth-sub">จัดการ Prompt และไอเดียงานครีเอทีฟของคุณในที่เดียว</p>

      <button class="jz-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        เข้าสู่ระบบด้วย Gmail
      </button>

      <div class="auth-foot">
        ใช้งานฟรี • ปลอดภัยด้วย Google OAuth<br>
        <a href="/landing.html" style="color:var(--jz-green-bright)">← กลับหน้าแรก</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    // already signed in? skip straight to dashboard
    (async function () {
      var session = await window.JZ9.auth.getSession();
      if (session) window.location.replace(window.JZ9_CONFIG.POST_LOGIN_REDIRECT || "/app/dashboard.html");
    })();
    document.getElementById("googleBtn").addEventListener("click", function () {
      window.JZ9.auth.signInWithGoogle();
    });
  </script>
</body>
</html>
